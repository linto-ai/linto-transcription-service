openapi: 3.0.3
info:
  title: Transcription service
  description: Transcription request interface
  version: 1.2.3

servers:
- url: /

security:
  - bearerAuth: []

paths:
  /list-services:
    get:
      tags:
      - Service Listing API
      summary: List Available sub-services
      responses:
        200:
          description: "List of available sub-services"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/subserviceList'
        500:
          description: "Server error"
          content:
            text/plain:
              schema:
                type: string
                default: "The server encountered an unexpected error."

  /transcribe:
    post:
      tags:
      - Speech-To-Text API
      summary: Perform Speech-to-Text
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                timestamps:
                  type: string
                  format: binary
                transcriptionConfig:
                  type: object
                  $ref: '#/components/schemas/transcriptionConfig'
                force_sync:
                  type: boolean
                  default: false
      responses:
        200:
          description: "Job successfully finished (force_sync)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/transcriptionResult'
            text/plain:
              schema:
                type: string
                example: The transcription
            text/vtt:
              schema:
                type: string
                example: The transcription as VTT subtitles.
            text/srt:
              schema:
                type: string
                example: The transcription as SRT subtitles.
        201:
          description: Successfully created transcription job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/jobID'
        400:
          description: "Bad request"
          content:
            text/plain:
              schema:
                type: string
                default: "Bad header / Bad parameters / No file attached"
        500:
          description: "Server error"
          content:
            text/plain:
              schema:
                type: string
                default: "The server encountered an unexpected error."

  /transcribe-multi:
    post:
      tags:
      - Speech-To-Text API
      summary: Perform Speech-to-Text for multiple files
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                multiTranscriptionConfig:
                  type: object
                  $ref: '#/components/schemas/multiTranscriptionConfig'
      responses:
        200:
          description: "Job successfully finished (force_sync)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/transcriptionResult'
            text/plain:
              schema:
                type: string
                example: The transcription
            text/vtt:
              schema:
                type: string
                example: The transcription as VTT subtitles.
            text/srt:
              schema:
                type: string
                example: The transcription as SRT subtitles.
        201:
          description: Successfully created transcription job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/jobID'
        400:
          description: "Bad request"
          content:
            text/plain:
              schema:
                type: string
                default: "Bad header / Bad parameters / No file attached"
        500:
          description: "Server error"
          content:
            text/plain:
              schema:
                type: string
                default: "The server encountered an unexpected error."
        
  /speaker-identification/voiceprint:
    post:
      tags:
      - Speaker Identification API
      summary: Compute a voiceprint vector from one or several enrollment audio files
      parameters:
        - $ref: '#/components/parameters/organizationIdHeader'
        - $ref: '#/components/parameters/speakerIdTokenHeader'
        - $ref: '#/components/parameters/speakerIdServiceName'
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        200:
          description: "Voiceprint successfully computed"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/voiceprintResult'
        400:
          description: "Validation error (missing file, bad header)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'
        401:
          description: "Invalid or missing X-Speaker-Id-Token header"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'
        404:
          description: "No speaker identification service available"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'
        502:
          description: "The worker task failed (worker message relayed in error)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'
        504:
          description: "The worker task timed out"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'

  /speaker-identification/collections/{collection}/speakers/{speakerId}:
    put:
      tags:
      - Speaker Identification API
      summary: Create or replace a speaker voiceprint within a collection
      parameters:
        - $ref: '#/components/parameters/organizationIdHeader'
        - $ref: '#/components/parameters/speakerIdTokenHeader'
        - $ref: '#/components/parameters/speakerIdServiceName'
        - $ref: '#/components/parameters/speakerIdCollection'
        - $ref: '#/components/parameters/speakerIdSpeakerId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name, vector, modelId]
              properties:
                name:
                  type: string
                  description: Display name of the speaker
                vector:
                  type: array
                  items:
                    type: number
                  description: Voiceprint vector (as returned by /speaker-identification/voiceprint)
                modelId:
                  type: string
                  description: Embedding model identifier the vector was computed with
      responses:
        200:
          description: "Speaker successfully upserted"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdStatus'
        400:
          description: "Validation error"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'
        401:
          description: "Invalid or missing X-Speaker-Id-Token header"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'
        403:
          description: "The collection does not belong to the declared organization"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'
        404:
          description: "No speaker identification service available"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'
        502:
          description: "The worker task failed (worker message relayed in error)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'
        504:
          description: "The worker task timed out"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'
    delete:
      tags:
      - Speaker Identification API
      summary: Delete a speaker voiceprint from a collection
      parameters:
        - $ref: '#/components/parameters/organizationIdHeader'
        - $ref: '#/components/parameters/speakerIdTokenHeader'
        - $ref: '#/components/parameters/speakerIdServiceName'
        - $ref: '#/components/parameters/speakerIdCollection'
        - $ref: '#/components/parameters/speakerIdSpeakerId'
      responses:
        200:
          description: "Speaker successfully deleted (idempotent)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdStatus'
        400:
          description: "Validation error"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'
        401:
          description: "Invalid or missing X-Speaker-Id-Token header"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'
        403:
          description: "The collection does not belong to the declared organization"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'
        404:
          description: "No speaker identification service available"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'
        502:
          description: "The worker task failed (worker message relayed in error)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'
        504:
          description: "The worker task timed out"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'

  /speaker-identification/collections/{collection}:
    delete:
      tags:
      - Speaker Identification API
      summary: Drop a whole speaker identification collection
      parameters:
        - $ref: '#/components/parameters/organizationIdHeader'
        - $ref: '#/components/parameters/speakerIdTokenHeader'
        - $ref: '#/components/parameters/speakerIdServiceName'
        - $ref: '#/components/parameters/speakerIdCollection'
      responses:
        200:
          description: "Collection successfully dropped (idempotent)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdStatus'
        400:
          description: "Validation error"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'
        401:
          description: "Invalid or missing X-Speaker-Id-Token header"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'
        403:
          description: "The collection does not belong to the declared organization"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'
        404:
          description: "No speaker identification service available"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'
        502:
          description: "The worker task failed (worker message relayed in error)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'
        504:
          description: "The worker task timed out"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'

  /speaker-identification/info:
    get:
      tags:
      - Speaker Identification API
      summary: Expose the speaker identification capability (from the service registry, no worker call)
      parameters:
        - $ref: '#/components/parameters/organizationIdHeader'
        - $ref: '#/components/parameters/speakerIdTokenHeader'
        - $ref: '#/components/parameters/speakerIdServiceName'
      responses:
        200:
          description: "Speaker identification is available"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdInfo'
        400:
          description: "Validation error (missing header)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'
        401:
          description: "Invalid or missing X-Speaker-Id-Token header"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/speakerIdError'
        404:
          description: "No speaker identification capable service registered"
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                    enum: [false]

  /job/{jobid}:
    get:
      tags:
        - Job status
      parameters:
        - name: "jobid"
          in: path
          required: true
          description: Job request ID
          schema:
            type: string

      responses:
        201:
          description: "Job successfully finished. Returns a result ID"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/jobFinished'
        202:
          description: Task is pending or still processing. Returns job progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/jobInProgress'
        404:
          description: jobid hasn't been found
          content: 
            application/json:
              schema: 
                $ref: '#/components/schemas/jobUnknown'
        500:
          description: Task has failed
          content: 
            application/json:
              schema: 
                $ref: '#/components/schemas/jobFailed'
  
  /results/{result_id}:
    get:
      tags:
        - Transcription result
      parameters:
        - name: result_id
          in: path
          required: true
          description: Result id
          schema:
            type: string
        - name: convert_numbers
          in: query
          required: false
          description: If true, numbers are replaced with digits.
          schema:
            type: boolean
            default: false
        - name: return_raw
          in: query
          required: false
          description: If true, return the raw text instead of the processed text.
          schema:
            type: boolean
            default: false
        - name: wordsub
          in: query
          required: false
          description: "Word substitution list originalWord:substituteWord"
          style: form
          schema:
            type: array
            items:
              type: string

      responses:
        200:
          description: Ressource available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/transcriptionResult'
            text/plain:
              schema:
                type: string
                example: The transcription
            text/vtt:
              schema:
                type: string
                example: The transcription as VTT subtitles.
            text/srt:
              schema:
                type: string
                example: The transcription as SRT subtitles.
        404:
          description: No ressource found for this id

  /job-log/{jobid}:
    get:
      tags:
      - Debug
      summary: Display task logs.
      parameters:
        - name: jobid
          in: path
          required: true
          description: Job ID
          schema:
            type: string
      responses:
        200:
          description: "Logs for the specified taskid"
          content:
            text/plain:
              schema:
                type: string
                default: "Task logs."
        404:
          description: "No logs found for specified taskid"
          content:
            text/plain:
              schema:
                type: string
                default: "No logs found for task X"
        500:
          description: "Server error"
          content:
            text/plain:
              schema:
                type: string
                default: "The server encountered an unexpected error."

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    organizationIdHeader:
      name: X-Organization-Id
      in: header
      required: true
      description: Organization identifier (24 hexadecimal characters)
      schema:
        type: string
    speakerIdTokenHeader:
      name: X-Speaker-Id-Token
      in: header
      required: false
      description: Static API token, required when SPEAKER_ID_API_TOKEN is set on the service
      schema:
        type: string
    speakerIdServiceName:
      name: serviceName
      in: query
      required: false
      description: Force a specific speaker identification capable diarization service
      schema:
        type: string
    speakerIdCollection:
      name: collection
      in: path
      required: true
      description: "Qdrant collection name, must match spkid_{organizationId}_{collectionId}"
      schema:
        type: string
    speakerIdSpeakerId:
      name: speakerId
      in: path
      required: true
      description: "Speaker identifier, must match (label|user):{24 hexadecimal characters}"
      schema:
        type: string
  schemas:
    transcriptionConfig:
      type: object
      properties:
        language:
          type: string
          default: null
        vadConfig:
          type: object
          $ref: '#/components/schemas/vadConfig'
        diarizationConfig:
          type: object
          $ref: '#/components/schemas/diarizationConfig'
        punctuationConfig:
          type: object
          $ref: '#/components/schemas/punctuationConfig'

    vadConfig:
      type: object
      properties:
        enableVad:
          type: boolean
          default: false
        methodName:
          type: string
          default: "WebRTC"
        minDuration:
          type: number
          default: 0
        maxDuration:
          type: number
          default: 1200


    diarizationConfig:
      type: object
      properties:
        enableDiarization:
          type: boolean
          default: false
        numberOfSpeaker:
          type: integer
          default: null
        maxNumberOfSpeaker:
          type: integer
          default: null
        speakerIdentification:
          type: string
          default: null
          description: "(Legacy) Speaker names to identify within the worker env-var collection: wildcard \"*\" or JSON list of names. Ignored when speakerIdentificationConfig is set."
        speakerIdentificationConfig:
          $ref: '#/components/schemas/speakerIdentificationConfig'
        serviceName:
          type: string
          default: null

    speakerIdentificationConfig:
      type: object
      description: "Speaker identification configuration. Requires enableDiarization and the X-Organization-Id header (must match organizationId). When SPEAKER_ID_API_TOKEN is set on the service, the X-Speaker-Id-Token header is also required."
      required: [organizationId, collections]
      properties:
        organizationId:
          type: string
          description: Organization identifier (24 hexadecimal characters)
        collections:
          type: array
          minItems: 1
          maxItems: 16
          items:
            type: string
          description: "Qdrant collection names, each must match spkid_{organizationId}_{collectionId}"
        speakers:
          description: "Wildcard \"*\" (default) or list of speaker identifiers to restrict the identification to"
          default: "*"
        minSimilarity:
          type: number
          default: null
          description: Minimum similarity threshold (defaults to the worker setting)

    voiceprintResult:
      type: object
      properties:
        vector:
          type: array
          items:
            type: number
        modelId:
          type: string
        dim:
          type: integer
        durationUsed:
          type: number

    speakerIdStatus:
      type: object
      properties:
        status:
          type: string
          enum: ["ok"]

    speakerIdInfo:
      type: object
      properties:
        enabled:
          type: boolean
        modelId:
          type: string
        dim:
          type: integer
        serviceName:
          type: string

    speakerIdError:
      type: object
      properties:
        error:
          type: string


    punctuationConfig:
      type: object
      properties:
        enablePunctuation:
          type: boolean
          default: false
        serviceName:
          type: string
          default: null

    subserviceList:
      type: object
      properties:
        serviceType:
          type: object
          default: "punctuation|diarization|..."
          properties:
            service_name: 
              type: string
            service_type:
              type: string
              default: "punctuation|diarization|..."
            service_langugage:
              type: string
              default: "fr-fr|en-us|*|?|..."
            queue_name:
              type: string
              default: "service_queue"
            description:
              type: string
              default: "Service short description"
            instances:
              type: array
              default: "Service short description"
              items:
                $ref: '#/components/schemas/service_instance'
      
    service_instance:
      type: object
      properties:
        host_name: 
          type: string
        last_alive:
          type: integer
          default: 1
        version:
          type: string
          default: "Service image versions"
        concurrency:
          type: integer
          default: 1
            
    
    jobID:
      type: object
      properties:
        jobid:
          type: string
    jobInProgress:
      type: object
      properties:
        state:
          type: string
          enum: [started, pending]
        steps:
          type: object
          properties:
            preprocessing:
              type: object
              properties:
                required:
                  type: boolean
                  enum: [true]
                state:
                  type: string
                  enum: ["pending", "done", "started"]
                  example: "done"
                progress:
                  type: number
                  default: 1.0
            diarization:
              type: object
              properties:
                required:
                  type: boolean
                  default: true
                state:
                  type: string
                  enum: ["pending", "done", "started"]
                  example: "started"
                progress:
                  type: number
                  example: 0.0
            transcription:
              type: object
              properties:
                required:
                  type: boolean
                  enum: [true]
                state:
                  type: string
                  enum: ["pending", "done", "started"]
                  example: "started"
                progress:
                  type: number
                  example: 0.250197289414994
            punctuation:
              type: object
              properties:
                required:
                  type: boolean
                  default: true
                state:
                  type: string
                  enum: ["pending", "done", "started"]
                  example: "pending"
                progress:
                  type: number
                  example: 0.0
            postprocessing:
              type: object
              properties:
                required:
                  type: boolean
                  enum: [true]
                state:
                  type: string
                  enum: ["pending", "done", "started"]
                  example: "pending"
                progress:
                  type: number
                  default: 0.0
    jobFinished:
      type: object
      properties:
        state:
          type: string
          enum: ["done"]
        result_id:
          type: string
          default: "552d2b53-e0cb-41c6-b5ed-a75a7fbde757 (hash to be used on the /results/{hash} route)"
    jobUnknown:
      type: object
      properties:
        state:
          type: string
          default: "failed"
        reason:
          type: string
          default: "Unknown jobid XXX"
    jobFailed:
      type: object
      properties:
        state:
          type: string
          default: "failed"
        reason:
          type: string
          default: "An error message"
    transcriptionResult:
      type: object
      properties:
        transcription_result:
          type: string
        confidence:
          type: number
        raw_transcription:
          type: string
        segments:
          type: array
          items:
            $ref: '#/components/schemas/speechSegment'
        diarization_speakers:
          type: array
          description: "Speaker list returned by the diarization worker. Contains identification scores (spk_id_score) when speaker identification was requested. May be absent on older results."
          items:
            type: object
    speechSegment:
      type: object
      properties:
        spk_id: 
          type: string
        start: 
          type: number
        end: 
          type: number
        duration: 
          type: number
        segment: 
          type: string
        raw_segment:
          type: string
        words:
          type: array
          items:
            $ref: '#/components/schemas/word'
    word:
      type: object
      properties:
        start:
          type: number
        end:
          type: number
        word:
          type: string
        confidence:
          type: number


